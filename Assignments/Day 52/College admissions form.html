<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Navbar</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Link</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                            aria-expanded="false">
                            Dropdown
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Action</a></li>
                            <li><a class="dropdown-item" href="#">Another action</a></li>

                                <hr class="dropdown-divider">

                        </ul>
                    </li>
                    <li class="nav-item">

                    </li>
                </ul>
                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />

</head>

<body>
    <center>
        <h1>Chandigarh University</h1>
    </center>
    <form>
        <center>
            <legend>
                <h2>Admission Form</h2>
            </legend>
            <table>
                <Tr>
                    <td>
                        <label>Enter your Full Name : </label>
                    </td>
                    <td>
                        <input type="text" pattern="[A-Za-z ]+" title="Only letters allowed">
                    </td>
                </Tr>
                <Tr>
                    <td>
                        <label>Gender :</label>
                    </td>
                    <td>
                        <input type="radio" name="gender"><label for="male">Male</label>
                        <input type="radio" name="gender"><label for="female">Female</label>
                    </td>
                </Tr>
                <Tr>
                    <td>
                        <label>Select your current degree:</label>
                    </td>
                    <td>
                        <select>
                            <option>12th</option>
                            <option>Graduation</option>
                            <option>Post Graduation</option>

                        </select>
                    </td>
                </Tr>
                <Tr>
                    <td>
                        <label>Enter your DOB:</label>
                    </td>
                    <td>
                        <input type="date">

                    </td>
                </Tr>
                <Tr>
                    <td>
                        <label>Hostel </label>
                    </td>
                    <td>
                        <select>
                            <option value="yes">Yes</option>
                            <option value="no">No</option>
                        </select>

                    </td>
                </Tr>
                <Tr>
                    <td>
                        <label>Hostel Prefrence:</label>
                    </td>
                    <td>
                        <select>
                            <option value="single">1-seater</option>
                            <option value="double">2-seater</option>
                            <option value="triple">3-seater</option>
                            <option value="triple">4-seater</option>
                    </td>
                </Tr>
                <Tr>
                    <td>
                        <label>select a course</label>
                    </td>
                    <td>
                        <select>
                            <option value="btech">B.Tech</option>
                            <option value="mtech">M.Tech</option>
                            <option value="bca">BCA</option>
                            <option value="mca">MCA</option>
                        </select>
                    </td>
                </Tr>
                <Tr>
                    <td>
                        <label>Enter Your Address:</label>
                    </td>
                    <td>
                        <input type="text">
                    </td>
                </Tr>
                <Tr>
                    <td>
                        <label>School</label>
                    </td>
                    <td>
                        <input type="text">
                    </td>
                </Tr>
                <Tr>
                    <td>
                        <label>Percentage in 10th:</label>
                    </td>
                    <td>
                        <input type="text">
                    </td>
                </Tr>
                <Tr>
                    <td>
                        <label>Percentage in 12th:</label>
                    </td>
                    <td>
                        <input type="text">
                    </td>
                </Tr>

                <Tr>
                    <td>
                        <label>Phone NO.:</label>
                    </td>
                    <td>
                        <input type="tel" placeholder="Enter phone number" pattern="[0-9]{10}"
                            title="Enter a valid 10-digit phone number">
                    </td>
                </Tr>
                <Tr>
                    <td>
                        <label>Email id:</label>
                    </td>
                    <td>
                        <input type="email" pattern="[a-zA-Z0-9._%+-]+@gmail\.com" placeholder="Enter Gmail address"
                            title="Enter a valid Gmail address">
                    </td>
                </Tr>
                <tr>
                    <td>
                        <label>Upload your Photo</label>
                    </td>
                    <td>
                        <input type="file">
                    </td>
                </tr>
                <Tr>
                    <td></td>
                    <td>
                        <button type="submit" colspan="2">Submit</button>
                        <input type="reset">
                    </td>



                </Tr>

            </table>
        </center>
    </form>

</body>

</html>
